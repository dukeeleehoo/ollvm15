name: Build OLLVM 21 Full-Feature Toolchain

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build cmake git clang lld

    - name: Clone OLLVM 21 source (lux-QAQ)
      run: |
        git clone -b ollvm-21 https://github.com/lux-QAQ/ollvm-clang21.0.git llvm-project
        cd llvm-project
        git rev-parse HEAD > ../commit_hash.txt
        cd ..

    - name: Configure CMake
      run: |
        cd llvm-project
        mkdir build && cd build
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_ENABLE_PROJECTS="clang;clang-tools-extra" \
          -DLLVM_TARGETS_TO_BUILD="X86" \
          ..

    - name: Build Clang
      run: |
        cd llvm-project/build
        ninja clang

    - name: Package toolchain
      run: |
        cd llvm-project/build
        mkdir -p ollvm-toolchain/bin
        cp bin/clang ollvm-toolchain/bin/
        cp bin/clang++ ollvm-toolchain/bin/
        cp bin/clang-cl ollvm-toolchain/bin/
        cp bin/lld ollvm-toolchain/bin/
        cp bin/llvm-ar ollvm-toolchain/bin/
        cp bin/llvm-ranlib ollvm-toolchain/bin/
        tar -czf ollvm-toolchain.tar.gz ollvm-toolchain

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ollvm-21-full-toolchain
        path: llvm-project/build/ollvm-toolchain.tar.gz
