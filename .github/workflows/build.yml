name: Build OLLVM-21 (Full)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake git lld clang

      - name: Checkout OLLVM-21 Source
        uses: actions/checkout@v4
        with:
          repository: lux-QAQ/ollvm-clang21.0
          # 默认拉取主分支，该仓库只有 main
          path: ollvm-clang21.0

      - name: Build OLLVM-21
        run: |
          cd ollvm-clang21.0
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS="clang" \
            -DLLVM_TARGETS_TO_BUILD="X86" \
            -DLLVM_USE_LINKER=lld \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            ../llvm
          ninja -j $(nproc) clang

      - name: Package Artifact
        run: |
          # 回到工作区根目录打包，确保上传步骤能找到文件
          mkdir -p ollvm21-toolchain/bin
          cp ollvm-clang21.0/build/bin/clang    ollvm21-toolchain/bin/
          cp ollvm-clang21.0/build/bin/clang++  ollvm21-toolchain/bin/
          cp ollvm-clang21.0/build/bin/clang-cl ollvm21-toolchain/bin/
          tar -czf ollvm21-toolchain.tar.gz ollvm21-toolchain

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollvm21-toolchain
          path: ollvm21-toolchain.tar.gz
          if-no-files-found: error
