name: Build OLLVM-21 (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      LLVM_VERSION: 21.0.0
    steps:
      - name: Install Build Tools and LLVM
        run: |
          # 安装 Ninja 和 CMake（忽略重复安装警告）
          choco install ninja cmake -y --no-progress --ignore-checksums

          # 刷新环境变量，确保 cmake、ninja 可直接使用
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

          # 构造 LLVM 下载 URL 与安装包路径
          $llvm_url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$env:LLVM_VERSION/LLVM-$env:LLVM_VERSION-win64.exe"
          $llvm_installer = "$env:RUNNER_TEMP\LLVM.exe"

          # 下载 LLVM 安装包
          Invoke-WebRequest -Uri $llvm_url -OutFile $llvm_installer

          # 静默安装到 C:\Program Files\LLVM
          Start-Process -Wait -FilePath $llvm_installer -ArgumentList "/S","/D=C:\Program Files\LLVM"

          # 将 LLVM bin 目录添加到后续步骤的 PATH
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Checkout OLLVM-21 Source
        uses: actions/checkout@v4
        with:
          repository: lux-QAQ/ollvm-clang21.0
          path: ollvm-clang21.0

      - name: Build OLLVM-21
        working-directory: ollvm-clang21.0
        run: |
          mkdir build
          cd build
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DLLVM_ENABLE_PROJECTS="clang" `
            -DLLVM_TARGETS_TO_BUILD="X86" `
            -DCMAKE_C_COMPILER=clang `
            -DCMAKE_CXX_COMPILER=clang++ `
            -DCMAKE_LINKER=lld `
            -DCMAKE_SYSTEM_NAME=Windows `
            ..\llvm
          ninja clang

      - name: Package Artifact
        run: |
          mkdir ollvm21-toolchain\bin
          copy ollvm-clang21.0\build\bin\clang.exe        ollvm21-toolchain\bin\clang.exe
          copy ollvm-clang21.0\build\bin\clang++.exe      ollvm21-toolchain\bin\clang++.exe
          copy ollvm-clang21.0\build\bin\clang-cl.exe     ollvm21-toolchain\bin\clang-cl.exe
          7z a ollvm21-toolchain.zip ollvm21-toolchain

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollvm21-toolchain-win64
          path: ollvm21-toolchain.zip
          if-no-files-found: error
