name: Build Hikari-LLVM15 Toolchain for Windows

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build cmake git lld clang

    - name: Clone Hikari-LLVM15 Source
      run: |
        git clone https://github.com/HikariObfuscator/Hikari-LLVM15
        cd Hikari-LLVM15

    - name: Configure CMake
      run: |
        cd Hikari-LLVM15
        mkdir build && cd build
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_ENABLE_PROJECTS="clang" \
          -DLLVM_TARGETS_TO_BUILD="X86" \
          -DLLVM_ENABLE_NEW_PASS_MANAGER=OFF \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          ../llvm

    - name: Build Clang
      run: |
        cd Hikari-LLVM15/build
        ninja clang

    - name: Package for Windows
      run: |
        cd Hikari-LLVM15/build
        mkdir -p ollvm-toolchain/bin
        mkdir -p ollvm-toolchain/lib
        mkdir -p ollvm-toolchain/include
        
        cp bin/clang-15 ollvm-toolchain/bin/
        cp bin/clang ollvm-toolchain/bin/
        cp bin/clang++ ollvm-toolchain/bin/
        cp bin/clang-cl ollvm-toolchain/bin/
        
        tar -czf ../ollvm-toolchain.tar.gz ollvm-toolchain

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: hikari-llvm15-toolchain
        path: Hikari-LLVM15/build/ollvm-toolchain.tar.gz
