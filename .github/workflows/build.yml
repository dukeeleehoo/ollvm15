name: Build Hikari-LLVM15

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake git lld-15 clang-15

      - name: Checkout Hikari-LLVM15
        uses: actions/checkout@v4
        with:
          repository: 61bcdefg/Hikari-LLVM15
          ref: main                    # 该仓库主分支就是 LLVM 15 版本
          path: Hikari-LLVM15

      - name: Build Hikari
        run: |
          cd Hikari-LLVM15             # 源码在根目录
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS="clang" \
            -DLLVM_TARGETS_TO_BUILD="X86" \
            -DLLVM_USE_LINKER=lld \
            -DCMAKE_C_COMPILER=clang-15 \
            -DCMAKE_CXX_COMPILER=clang++-15 \
            ../llvm
          ninja -j $(nproc) clang

      - name: Package Artifact
        run: |
          mkdir -p Hikari15-toolchain/bin
          cp Hikari-LLVM15/build/bin/clang      Hikari15-toolchain/bin/
          cp Hikari-LLVM15/build/bin/clang++    Hikari15-toolchain/bin/
          cp Hikari-LLVM15/build/bin/clang-cl   Hikari15-toolchain/bin/
          tar -czf Hikari15-toolchain.tar.gz Hikari15-toolchain

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hikari15-toolchain
          path: Hikari15-toolchain.tar.gz
          if-no-files-found: error
