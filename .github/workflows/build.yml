name: Build OLLVM-15 (yangyiyu08/ollvm-project)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake git lld-15 clang-15

      - name: Checkout OLLVM Source
        uses: actions/checkout@v4
        with:
          repository: yangyiyu08/ollvm-project
          ref: llvm-15.x               # 该仓库确实存在此分支
          path: ollvm-project

      - name: Build OLLVM
        run: |
          cd ollvm-project            # 源码在根目录
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS="clang" \
            -DLLVM_TARGETS_TO_BUILD="X86" \
            -DLLVM_USE_LINKER=lld \
            -DCMAKE_C_COMPILER=clang-15 \
            -DCMAKE_CXX_COMPILER=clang++-15 \
            ../llvm                   # 正确指向根目录下的 llvm 文件夹
          ninja -j $(nproc) clang

      - name: Package Artifact
        run: |
          mkdir -p ollvm15-toolchain/bin
          cp ollvm-project/build/bin/clang ollvm15-toolchain/bin/
          cp ollvm-project/build/bin/clang++ ollvm15-toolchain/bin/
          cp ollvm-project/build/bin/clang-cl ollvm15-toolchain/bin/
          tar -czf ollvm15-toolchain.tar.gz ollvm15-toolchain

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollvm15-toolchain
          path: ollvm15-toolchain.tar.gz
          if-no-files-found: error
