name: Build OLLVM-21 (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      LLVM_VERSION: 21.1.0
    steps:
      - name: Install Build Tools and LLVM
        shell: powershell
        run: |
          choco install ninja cmake -y --no-progress --ignore-checksums
          refreshenv
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$env:LLVM_VERSION/LLVM-$env:LLVM_VERSION-win64.exe"
          $output = "$env:RUNNER_TEMP\LLVM.exe"
          Invoke-WebRequest -Uri $url -OutFile $output
          Start-Process -Wait -FilePath $output -ArgumentList "/S","/D=C:\Program Files\LLVM"
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:Path = "C:\Program Files\LLVM\bin;" + `
            [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + `
            [System.Environment]::GetEnvironmentVariable("Path","User")

      # 激活 VS 2022 开发环境（windows-latest 自带），确保 CMake 能找到所有 MSVC 工具
      - name: Setup VS 2022 Build Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64          # 不指定 vsversion 则自动使用最新安装的 VS，即 2022

      - name: Checkout OLLVM-21 Source
        uses: actions/checkout@v4
        with:
          repository: lux-QAQ/ollvm-clang21.0
          path: ollvm-clang21.0

      - name: Build OLLVM-21
        working-directory: ollvm-clang21.0
        run: |
          mkdir build
          cd build
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DLLVM_ENABLE_PROJECTS="clang" `
            -DLLVM_TARGETS_TO_BUILD="X86" `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DCMAKE_LINKER=lld-link `
            -DCMAKE_SYSTEM_NAME=Windows `
            ..\llvm
          ninja clang

      - name: Package Artifact
        run: |
          mkdir ollvm21-toolchain\bin
          copy ollvm-clang21.0\build\bin\clang.exe      ollvm21-toolchain\bin\clang.exe
          copy ollvm-clang21.0\build\bin\clang++.exe    ollvm21-toolchain\bin\clang++.exe
          copy ollvm-clang21.0\build\bin\clang-cl.exe   ollvm21-toolchain\bin\clang-cl.exe
          7z a ollvm21-toolchain.zip ollvm21-toolchain

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollvm21-toolchain-win64
          path: ollvm21-toolchain.zip
          if-no-files-found: error
