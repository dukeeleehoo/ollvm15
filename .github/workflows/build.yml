name: Build Hikari-LLVM15

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake git lld-15 clang-15

      - name: Checkout Hikari Source
        uses: actions/checkout@v4
        with:
          repository: HikariObfuscator/Hikari
          ref: llvm-15                # 这个分支确实存在
          path: Hikari

      - name: Build Hikari
        run: |
          cd Hikari                    # 源码就在根目录
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS="clang" \
            -DLLVM_TARGETS_TO_BUILD="X86" \
            -DLLVM_USE_LINKER=lld \
            -DCMAKE_C_COMPILER=clang-15 \
            -DCMAKE_CXX_COMPILER=clang++-15 \
            ../llvm
          ninja -j $(nproc) clang

      - name: Package Artifact
        run: |
          mkdir -p Hikari-toolchain/bin
          cp Hikari/build/bin/clang Hikari-toolchain/bin/
          cp Hikari/build/bin/clang++ Hikari-toolchain/bin/
          cp Hikari/build/bin/clang-cl Hikari-toolchain/bin/
          tar -czf Hikari-toolchain.tar.gz Hikari-toolchain

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hikari-toolchain
          path: Hikari-toolchain.tar.gz
          if-no-files-found: error
