name: Build OLLVM-21 (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Install Build Tools and LLVM
        shell: powershell
        run: |
          # 1. 安装基础构建工具 (覆盖已知的 choco 警告坑)
          choco install ninja cmake -y --no-progress --ignore-checksums
          refreshenv

          # 2. 使用 winget 安装 LLVM (放弃不稳定的手动下载，一劳永逸)
          # 这会自动处理下载、安装和 PATH 配置，完美避开连接中断问题。
          Write-Host "正在通过 winget 安装 LLVM (此过程需要几分钟)..."
          winget install --id=LLVM.LLVM -e --accept-source-agreements --accept-package-agreements
          
          # 3. 刷新环境变量，确保所有后续步骤都能找到 clang/clang++ 等工具
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          
          # 验证安装
          clang --version

      - name: Checkout OLLVM-21 Source
        uses: actions/checkout@v4
        with:
          repository: lux-QAQ/ollvm-clang21.0
          path: ollvm-clang21.0

      - name: Build OLLVM-21
        working-directory: ollvm-clang21.0
        run: |
          mkdir build
          cd build
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DLLVM_ENABLE_PROJECTS="clang" `
            -DLLVM_TARGETS_TO_BUILD="X86" `
            -DCMAKE_C_COMPILER=clang `
            -DCMAKE_CXX_COMPILER=clang++ `
            -DCMAKE_LINKER=lld `
            -DCMAKE_SYSTEM_NAME=Windows `
            # [新增] 绕过原子操作检查 (覆盖“libatomic”的坑)
            -DHAVE_CXX_ATOMICS_WITHOUT_LIB=TRUE `
            -DHAVE_CXX_ATOMICS64_WITHOUT_LIB=TRUE `
            ..\llvm
          ninja clang

      - name: Package Artifact
        run: |
          mkdir ollvm21-toolchain\bin
          copy ollvm-clang21.0\build\bin\clang.exe        ollvm21-toolchain\bin\clang.exe
          copy ollvm-clang21.0\build\bin\clang++.exe      ollvm21-toolchain\bin\clang++.exe
          copy ollvm-clang21.0\build\bin\clang-cl.exe     ollvm21-toolchain\bin\clang-cl.exe
          7z a ollvm21-toolchain.zip ollvm21-toolchain

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollvm21-toolchain-win64
          path: ollvm21-toolchain.zip
          if-no-files-found: error
